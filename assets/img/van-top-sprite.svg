<svg xmlns="http://www.w3.org/2000/svg" width="440" height="700" viewBox="0 0 440 700">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6f4a27"/>
      <stop offset="0.5" stop-color="#a9793f"/>
      <stop offset="1" stop-color="#6f4a27"/>
    </linearGradient>
    <linearGradient id="deck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a3a1f"/>
      <stop offset="0.5" stop-color="#7d5330"/>
      <stop offset="1" stop-color="#5a3a1f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3138"/>
      <stop offset="1" stop-color="#4a545e"/>
    </linearGradient>
    <linearGradient id="sail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#efe6cf"/>
      <stop offset="1" stop-color="#d9caa4"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ombra -->
  <ellipse cx="220" cy="360" rx="175" ry="330" fill="url(#sh)"/>

  <!-- corpo van (front in alto, retro in basso) -->
  <rect x="96" y="46" width="248" height="600" rx="70" ry="60" fill="url(#wood)" stroke="#3d2814" stroke-width="4"/>
  <!-- doghe legno -->
  <g stroke="#5c3d20" stroke-width="1.6" opacity="0.5">
    <line x1="150" y1="60" x2="150" y2="632"/>
    <line x1="185" y1="52" x2="185" y2="640"/>
    <line x1="220" y1="50" x2="220" y2="642"/>
    <line x1="255" y1="52" x2="255" y2="640"/>
    <line x1="290" y1="60" x2="290" y2="632"/>
  </g>

  <!-- muso / cofano (in alto) -->
  <path d="M120 92 Q220 40 320 92 L318 150 Q220 120 122 150 Z" fill="#4a3320" opacity="0.55"/>
  <!-- specchietti -->
  <ellipse cx="92" cy="176" rx="15" ry="9" fill="#3d2814"/>
  <ellipse cx="348" cy="176" rx="15" ry="9" fill="#3d2814"/>

  <!-- parabrezza -->
  <path d="M132 150 Q220 132 308 150 L296 214 Q220 200 144 214 Z" fill="url(#glass)" stroke="#20262c" stroke-width="3"/>
  <!-- tettuccio -->
  <rect x="150" y="232" width="140" height="70" rx="10" fill="#1f242a" opacity="0.85"/>

  <!-- ponte di poppa (retro) -->
  <rect x="116" y="330" width="208" height="300" rx="16" fill="url(#deck)" stroke="#3d2814" stroke-width="3"/>
  <g stroke="#4a3320" stroke-width="1.4" opacity="0.6">
    <line x1="116" y1="380" x2="324" y2="380"/>
    <line x1="116" y1="430" x2="324" y2="430"/>
    <line x1="116" y1="480" x2="324" y2="480"/>
    <line x1="116" y1="530" x2="324" y2="530"/>
    <line x1="116" y1="580" x2="324" y2="580"/>
  </g>

  <!-- balaustra sul bordo posteriore (basso) -->
  <g fill="#4a3320" stroke="#2e1e10" stroke-width="1">
    <rect x="120" y="612" width="200" height="12" rx="4"/>
    <rect x="120" y="332" width="200" height="10" rx="4"/>
  </g>
  <g fill="#5a3a1f">
    <circle cx="140" cy="620" r="7"/><circle cx="170" cy="620" r="7"/>
    <circle cx="200" cy="620" r="7"/><circle cx="230" cy="620" r="7"/>
    <circle cx="260" cy="620" r="7"/><circle cx="290" cy="620" r="7"/>
  </g>

  <!-- albero + pennone (visti dall'alto) -->
  <rect x="212" y="300" width="16" height="230" rx="6" fill="#6b4626" stroke="#3d2814" stroke-width="2"/>
  <rect x="150" y="352" width="140" height="12" rx="5" fill="#6b4626" stroke="#3d2814" stroke-width="1.5"/>
  <!-- vela -->
  <path d="M162 366 Q220 348 278 366 L272 470 Q220 452 168 470 Z" fill="url(#sail)" stroke="#c7b485" stroke-width="2"/>
  <!-- rete -->
  <g stroke="#e7e0cf" stroke-width="1" opacity="0.7">
    <line x1="150" y1="360" x2="150" y2="470"/><line x1="180" y1="356" x2="180" y2="470"/>
    <line x1="210" y1="352" x2="210" y2="470"/><line x1="240" y1="356" x2="240" y2="470"/>
    <line x1="270" y1="360" x2="270" y2="470"/>
    <line x1="150" y1="390" x2="290" y2="390"/><line x1="150" y1="420" x2="290" y2="420"/>
    <line x1="150" y1="450" x2="290" y2="450"/>
  </g>

  <!-- alghe verdi -->
  <g stroke="#4c7a3a" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M130 340 q-6 20 2 40"/><path d="M150 342 q-4 18 3 36"/>
    <path d="M310 340 q6 20 -2 40"/><path d="M290 342 q4 18 -3 36"/>
  </g>
  <!-- corde -->
  <g stroke="#d8c9a0" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M128 470 q10 26 -2 54"/><path d="M312 470 q-10 26 2 54"/>
  </g>

  <!-- fascia rossa a fiori (bordo posteriore) -->
  <path d="M120 588 Q220 604 320 588 L320 626 Q220 640 120 626 Z" fill="#7c2b24" opacity="0.9"/>
  <g fill="#e9e2d3" opacity="0.85">
    <circle cx="150" cy="612" r="4"/><circle cx="180" cy="618" r="4"/><circle cx="210" cy="614" r="4"/>
    <circle cx="240" cy="618" r="4"/><circle cx="270" cy="613" r="4"/><circle cx="300" cy="610" r="4"/>
  </g>

  <!-- emblema apeira -->
  <circle cx="220" cy="560" r="20" fill="#c9a24a" opacity="0.95" stroke="#8a6a24" stroke-width="2"/>
  <circle cx="220" cy="560" r="7" fill="#7c2b24"/>

  <!-- pappagallo sulla cima albero -->
  <circle cx="220" cy="300" r="7" fill="#d33a2c"/>
  <path d="M224 298 q8 -2 12 4 q-8 2 -12 -4" fill="#2a72c9"/>
</svg>
